<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Samsung S24</title>

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                🛒 Siddharth Store
            </a>
        </div>
    </nav>

    <div class="product-detail">

        <div class="detail-image">
            <img

                alt="Samsung">
        </div>

        <div class="detail-info">

            <h1>
                Samsung S24
            </h1>

            <h2>
                ₹65,000
            </h2>

            <p>
                ⭐⭐⭐⭐☆
                (4.5/5)
            </p>

            <p>
                ✅ In Stock
            </p>

            <h3>
                Specifications
            </h3>

            <ul>
                <li>256GB Storage</li>
                <li>50MP Camera</li>
                <li>Snapdragon Processor</li>
                <li>Dynamic AMOLED Display</li>
                <li>Fast Charging</li>
            </ul>

            <button class="buy-btn">
                Buy Now
            </button>

            <button onclick="history.back()">
                Back
            </button>

        </div>

    </div>

</body>
</html>
