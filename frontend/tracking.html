<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Order Tracking

    </title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">

            <a href="index.html">

                🛒 Siddharth Store

            </a>

        </div>

    </nav>

    <div class="tracking-container">

        <h1>

            📦 Track Your Order

        </h1>

        <p>

            Order ID:
            #SD2026001

        </p>

        <div class="tracking-step active">

            ✅ Order Placed

        </div>

        <div class="tracking-step active">

            📦 Packed

        </div>

        <div class="tracking-step active">

            🚚 Shipped

        </div>

        <div class="tracking-step">

            🛵 Out For Delivery

        </div>

        <div class="tracking-step">

            🎉 Delivered

        </div>

        <br>

        <button
            onclick="history.back()">

            Back

        </button>

    </div>

</body>
</html>
